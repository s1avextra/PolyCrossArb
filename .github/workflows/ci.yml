name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies (with execution + dev extras)
        run: uv pip install --system ".[dev,execution]"

      - name: Install ruff and mypy
        run: pip install ruff mypy

      - name: Lint (ruff check)
        run: ruff check src/ tests/ scripts/

      - name: Type check (mypy, non-blocking)
        # Mypy starts permissive — strict mode comes after Phase 3
        continue-on-error: true
        run: mypy --ignore-missing-imports --no-strict-optional src/polycrossarb

      - name: Run unit tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/ -v --cov=polycrossarb --cov-report=term-missing --cov-fail-under=20

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust_engine/Cargo.lock', 'rust_engine/Cargo.toml') }}

      - name: Build rust_engine (release)
        working-directory: rust_engine
        run: cargo build --release --locked

      - name: Cargo test
        working-directory: rust_engine
        run: cargo test --release --locked

  smoke-test:
    runs-on: ubuntu-latest
    needs: [python]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system ".[dev,execution]"

      - name: API smoke test
        run: python scripts/smoke_test.py

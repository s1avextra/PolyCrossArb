name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v

  smoke-test:
    runs-on: ubuntu-latest
    # Only run smoke test on main branch (requires API access)
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: API smoke test
        run: python scripts/smoke_test.py
